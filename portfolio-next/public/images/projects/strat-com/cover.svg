      <stop offset="0%" style="stop-color:#f9ce34"/>
      <stop offset="30%" style="stop-color:#ee2a7b"/>
      <stop offset="70%" style="stop-color:#6228d7"/>
      <stop offset="100%" style="stop-color:#3051f1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="#fafafa"/>
  <!-- Background blobs -->
  <circle cx="150" cy="150" r="200" fill="#f9ce34" opacity="0.08"/>
  <circle cx="650" cy="350" r="200" fill="#ee2a7b" opacity="0.08"/>
  <circle cx="400" cy="400" r="150" fill="#6228d7" opacity="0.06"/>
  <!-- Instagram logo mockup -->
  <rect x="330" y="120" width="140" height="140" rx="35" fill="url(#ig)"/>
  <rect x="350" y="140" width="100" height="100" rx="25" fill="none" stroke="white" stroke-width="8"/>
  <circle cx="400" cy="190" r="22" fill="none" stroke="white" stroke-width="7"/>
  <circle cx="435" cy="155" r="7" fill="white"/>
