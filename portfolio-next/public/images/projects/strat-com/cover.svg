  <rect x="100" y="320" width="160" height="80" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="180" y="355" text-anchor="middle" fill="#ee2a7b" font-size="24" font-weight="bold" font-family="sans-serif">4.2k</text>
  <text x="180" y="380" text-anchor="middle" fill="#6b7280" font-size="12" font-family="sans-serif">abonnés</text>
  <rect x="320" y="300" width="160" height="80" rx="12" fill="white"/>
  <text x="400" y="335" text-anchor="middle" fill="#6228d7" font-size="24" font-weight="bold" font-family="sans-serif">38</text>
