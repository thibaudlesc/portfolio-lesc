  <rect x="540" y="320" width="160" height="80" rx="12" fill="white"/>
  <text x="620" y="355" text-anchor="middle" fill="#f9ce34" font-size="24" font-weight="bold" font-family="sans-serif" fill="#e8693a">12%</text>
